<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 410" role="img" aria-label="CCTV and access control system architecture">
  <title>CCTV and Access Control System Architecture</title>
  <desc>Three-tier security architecture: field devices feed central infrastructure which feeds the control room.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .label { font: 12px 'Montserrat', sans-serif; fill: #888780; }
      .title { font: 500 14px 'Montserrat', sans-serif; }
      .sub { font: 12px 'Montserrat', sans-serif; }
      .arr { stroke: #888780; stroke-width: 1; fill: none; }
      .blue rect { fill: #E6F1FB; stroke: #185FA5; }
      .blue .title { fill: #0C447C; }
      .blue .sub { fill: #185FA5; }
      .purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .purple .title { fill: #3C3489; }
      .purple .sub { fill: #534AB7; }
      .teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .teal .title { fill: #085041; }
      .teal .sub { fill: #0F6E56; }
    </style>
  </defs>

  <text class="label" x="40" y="35">Field devices</text>
  <g class="blue">
    <rect x="80" y="50" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="title" x="160" y="73" text-anchor="middle" dominant-baseline="central">IP cameras</text>
    <text class="sub" x="160" y="91" text-anchor="middle" dominant-baseline="central">Multiple zones</text>
  </g>
  <g class="blue">
    <rect x="260" y="50" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="title" x="340" y="73" text-anchor="middle" dominant-baseline="central">Card readers</text>
    <text class="sub" x="340" y="91" text-anchor="middle" dominant-baseline="central">Door access points</text>
  </g>
  <g class="blue">
    <rect x="440" y="50" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="title" x="520" y="73" text-anchor="middle" dominant-baseline="central">Door controllers</text>
    <text class="sub" x="520" y="91" text-anchor="middle" dominant-baseline="central">Locks and barriers</text>
  </g>

  <line x1="160" y1="110" x2="160" y2="173" class="arr" marker-end="url(#arrow)"/>
  <line x1="340" y1="110" x2="340" y2="173" class="arr" marker-end="url(#arrow)"/>
  <line x1="520" y1="110" x2="520" y2="173" class="arr" marker-end="url(#arrow)"/>

  <text class="label" x="40" y="165">Central infrastructure</text>
  <g class="purple">
    <rect x="80" y="180" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="title" x="160" y="203" text-anchor="middle" dominant-baseline="central">NVR and storage</text>
    <text class="sub" x="160" y="221" text-anchor="middle" dominant-baseline="central">24/7 recording</text>
  </g>
  <g class="purple">
    <rect x="260" y="180" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="title" x="340" y="203" text-anchor="middle" dominant-baseline="central">Network switch</text>
    <text class="sub" x="340" y="221" text-anchor="middle" dominant-baseline="central">PoE backbone</text>
  </g>
  <g class="purple">
    <rect x="440" y="180" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="title" x="520" y="203" text-anchor="middle" dominant-baseline="central">ACS server</text>
    <text class="sub" x="520" y="221" text-anchor="middle" dominant-baseline="central">Access policies</text>
  </g>

  <path d="M 160,240 V 280 H 260 V 313" class="arr" marker-end="url(#arrow)"/>
  <path d="M 520,240 V 280 H 460 V 313" class="arr" marker-end="url(#arrow)"/>

  <text class="label" x="40" y="305">Control room</text>
  <g class="teal">
    <rect x="180" y="318" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="title" x="260" y="341" text-anchor="middle" dominant-baseline="central">Video wall</text>
    <text class="sub" x="260" y="359" text-anchor="middle" dominant-baseline="central">Live monitoring</text>
  </g>
  <g class="teal">
    <rect x="380" y="318" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="title" x="460" y="341" text-anchor="middle" dominant-baseline="central">Operator console</text>
    <text class="sub" x="460" y="359" text-anchor="middle" dominant-baseline="central">Alerts and reports</text>
  </g>
</svg>
